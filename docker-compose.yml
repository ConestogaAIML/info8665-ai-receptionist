services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - sqlite-data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - SQLITE_DB_PATH=/data/receptionist.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/receptionist/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sqlite-data:
