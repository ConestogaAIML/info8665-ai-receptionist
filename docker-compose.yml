services:
  api:
    build: .
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - sqlite-data:/data
      - app-logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - SQLITE_DB_PATH=/data/receptionist.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-in-production}
      - LOG_FILE_PATH=/app/logs/app.log
      - API_BASE_URL=http://127.0.0.1:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite-data:
  app-logs:
