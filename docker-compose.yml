services:
  api:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "8000:8000"
      - "8501:8501"
      - "3000:3000"
    volumes:
      - sqlite-data:/data
      - app-logs:/app/logs
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - SQLITE_DB_PATH=/data/receptionist.db
      - DB_ENGINE=${DB_ENGINE:-sqlite}
      - DB_USERNAME=${DB_USERNAME:-receptionist}
      - DB_PASSWORD=${DB_PASSWORD:-changeme-db-password}
      - DB_HOSTNAME=${DB_HOSTNAME:-localhost}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-ai_receptionist}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-in-production}
      - LOG_FILE_PATH=/app/logs/app.log
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_BASE_URL=http://127.0.0.1:8000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - FEATURE_NAMES=${FEATURE_NAMES:-Age,WaitingDays,AppointmentWeekday,AppointmentHour,SMS_received}
      - TARGET_COLUMN=${TARGET_COLUMN:-No-show}
      - PROCESSED_DATA_PATH=${PROCESSED_DATA_PATH:-data/processed/processed_appointments.csv}
      - MODEL_PATH=${MODEL_PATH:-data/model/no_show_model.pkl}
      - ML_N_ESTIMATORS=${ML_N_ESTIMATORS:-100}
      - ML_MAX_DEPTH=${ML_MAX_DEPTH:-}
      - ML_RANDOM_STATE=${ML_RANDOM_STATE:-42}
      - ML_TEST_SIZE=${ML_TEST_SIZE:-0.2}
      - ML_EPOCHS=${ML_EPOCHS:-3}
      - EXPERIMENT_NAME=${EXPERIMENT_NAME:-appointment-no-show}
      - EXPERIMENT_VERSION=${EXPERIMENT_VERSION:-1.0.0}
      - EXPECTED_ACCURACY=${EXPECTED_ACCURACY:-0.75}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - separate-frontend

volumes:
  sqlite-data:
  app-logs:
